name: AgentPress Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate AgentPress assets
        run: python3 scripts/validate_agentpress_assets.py
      - name: Parse JSON and XML assets
        run: |
          python3 - <<'PY'
          import json, pathlib, xml.etree.ElementTree as ET
          for p in pathlib.Path('.').rglob('*.json'):
              json.loads(p.read_text())
          for p in pathlib.Path('.').rglob('*.xml'):
              ET.parse(p)
          print('json/xml ok')
          PY
      - name: Build smoke test
        run: |
          rm -rf /tmp/agentpress-liquidity
          python3 scripts/agentpress.py build agentpress/examples/liquidity-trap --out /tmp/agentpress-liquidity
          test -f /tmp/agentpress-liquidity/index.html
      - name: Local availability gate
        run: python3 scripts/check_agentpress_availability.py --root .
      - name: Cross-agent eval prompt parse gate
        run: |
          python3 - <<'PY'
          import json, pathlib
          path = pathlib.Path('agentpress/evals/cross_agent_compatibility_prompts.jsonl')
          rows = [json.loads(line) for line in path.read_text().splitlines() if line.strip()]
          assert rows, 'no cross-agent compatibility prompts'
          families = {r['agent_family'] for r in rows}
          required = {'codex', 'claude', 'gemini', 'glm', 'open_source_instruct'}
          missing = required - families
          assert not missing, f'missing agent families: {missing}'
          print(f'cross-agent prompts ok: {len(rows)} rows')
          PY
